<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <style>
    body {
      display: flex;
      justify-content: center;   
      align-items: center;       
      height: 100vh;             
      margin: 0;                 
      background-color: #f9f9f9; 
    }

    .card {
      width: 300px;
      height: 450px;
      border: 3px solid #ccc;
      border-radius: 50px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;   
      align-items: center;       
    }

    .profile-image {
      width: 100px;
      height: 100px;
      border-radius: 50%;        
      margin-bottom: 15px;
      object-fit: cover;         
    }

    .name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .bio {
      font-size: 16px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://avatars.githubusercontent.com/u/190161845?v=4" alt="Profile Image" class="profile-image">
    <div class="name">Shubham Yadav</div>
    <div class="bio">Software Engineer with a passion for creating innovative solutions.</div>
  </div>
</body>
</html>
